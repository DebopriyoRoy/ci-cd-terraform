apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-k8s-deployment
spec:
  replicas: 3 
  selector:
    matchLabels:
      app: project-k8s
  template:
    metadata:
      labels:
        app: project-k8s
    spec:
      containers:
      - name: project-k8s
        image: 557270420072.dkr.ecr.us-east-1.amazonaws.com/cicd-jenkins:latest
        ports:
        - containerPort: 8080  

---
apiVersion: v1
kind: Service
metadata:
  name: project-k8s-service
  namespace: default
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  loadBalancerClass: eks.amazonaws.com/nlb
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: project-k8s
